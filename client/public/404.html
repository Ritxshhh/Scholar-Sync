<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Scholar Sync - LMS</title>
    <script>
      // GitHub Pages SPA redirect workaround
      // When GitHub Pages serves a 404, this script redirects to index.html
      // with the original path preserved as a query parameter, which is then
      // restored by a corresponding script in index.html.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
